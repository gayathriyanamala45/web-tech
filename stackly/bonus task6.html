<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Challenge Task</title>
</head>
<body>

<h2>Employee Challenge Task</h2>
<p>Press <b>F12</b> and open the <b>Console</b> to see the output.</p>

<script>

// Employee Data
let employees = [
    {
        name: "Gayathri",
        id: 101,
        salary: 50000
    },
    {
        name: "Ramu",
        id: 102,
        salary: 45000
    },
    {
        name: "sitha",
        id: 103,
        salary: 50000
    }
];

// 1. Total Number of Employees
console.log("1. Total Employees:", employees.length);

// 2. Highest Salary
let highestSalary = Math.max(...employees.map(emp => emp.salary));
console.log("2. Highest Salary: ₹" + highestSalary);

// 3. Lowest Salary
let lowestSalary = Math.min(...employees.map(emp => emp.salary));
console.log("3. Lowest Salary: ₹" + lowestSalary);

// 4. Total Salary
let totalSalary = employees.reduce((sum, emp) => sum + emp.salary, 0);
console.log("4. Total Salary: ₹" + totalSalary);

// 5. Employee with Highest Salary
let highestEmployee = employees.reduce((a, b) =>
    a.salary > b.salary ? a : b
);
console.log("5. Highest Salary Employee:");
console.log(highestEmployee);

// 6. Employee with Lowest Salary
let lowestEmployee = employees.reduce((a, b) =>
    a.salary < b.salary ? a : b
);
console.log("6. Lowest Salary Employee:");
console.log(lowestEmployee);

// 7. Employees with Salary Greater Than ₹40,000
console.log("7. Employees with Salary > ₹40,000");
employees
    .filter(emp => emp.salary > 40000)
    .forEach(emp => {
        console.log(emp.name + " - ₹" + emp.salary);
    });

// 8. Search Employee by ID
let searchId = 102;
let employee = employees.find(emp => emp.id === searchId);

console.log("8. Search Employee by ID");
if (employee) {
    console.log(employee);
} else {
    console.log("Employee Not Found");
}

// 9. Add ₹5,000 Bonus
console.log("9. Salary After Bonus");
employees.forEach(emp => {
    let newSalary = emp.salary + 5000;
    console.log(emp.name + " - ₹" + newSalary);
});

// 10. Professional Employee Report
console.log("10. Employee Report");

employees.forEach(emp => {
    let newSalary = emp.salary + 5000;

    console.log(`
--------------------------------
Employee Name : ${emp.name}
Employee ID   : ${emp.id}
Salary        : ₹${emp.salary}
Bonus         : ₹5000
New Salary    : ₹${newSalary}
--------------------------------
`);
});

</script>

</body>
</html>
