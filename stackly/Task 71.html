<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Tasks 6-15</title>
</head>
<body>

<h2>JavaScript Tasks 6 - 15 Output (Check Console)</h2>

<script>

// ================= Task 6 - Traffic Signal =================
console.log("---- Task 6 ----");

let signal = "Green";

switch (signal) {
    case "Red":
        console.log("Stop");
        break;
    case "Yellow":
        console.log("Ready");
        break;
    case "Green":
        console.log("Go");
        break;
    default:
        console.log("Invalid");
}

// ================= Task 7 - ATM Machine =================
console.log("---- Task 7 ----");

let option = 1;
let balance = 5000;

switch (option) {
    case 1:
        console.log("Balance:", balance);
        break;

    case 2:
        balance += 1000;
        console.log("Deposited, New Balance:", balance);
        break;

    case 3:
        balance -= 500;
        console.log("Withdraw, Balance:", balance);
        break;

    case 4:
        console.log("Exit");
        break;
}

// ================= Task 8 - Cricket Score =================
console.log("---- Task 8 ----");

let score = [10, 25, 40, 60, 80, 100];

console.log("Highest:", Math.max(...score));
console.log("Lowest:", Math.min(...score));
let total = score.reduce((a, b) => a + b, 0);
console.log("Total:", total);
console.log("Average:", total / score.length);

// ================= Task 9 - Movie Ticket =================
console.log("---- Task 9 ----");

let age = 20;
let confirmEntry = true;

if (confirmEntry) {
    if (age >= 18) {
        console.log("Allow Movie");
    } else {
        console.log("Not Allowed");
    }
} else {
    console.log("Cancelled");
}

// ================= Task 10 - Hospital Appointment =================
console.log("---- Task 10 ----");

let token = 2;

switch (token) {
    case 1:
        console.log("Doctor A");
        break;
    case 2:
        console.log("Doctor B");
        break;
    case 3:
        console.log("Doctor C");
        break;
}

// ================= Task 11 - Array Methods =================
console.log("---- Task 11 ----");

let fruits = ["Apple", "Orange", "Banana"];

fruits.push("Mango");
console.log("push:", fruits);

fruits.pop();
console.log("pop:", fruits);

fruits.shift();
console.log("shift:", fruits);

fruits.unshift("Grapes");
console.log("unshift:", fruits);

console.log("slice:", fruits.slice(0, 2));

fruits.splice(1, 1, "Kiwi");
console.log("splice:", fruits);

// ================= Task 12 - Higher Order Methods =================
console.log("---- Task 12 ----");

let employees = [
    {name:"A", salary:20000},
    {name:"B", salary:35000},
    {name:"C", salary:50000},
    {name:"D", salary:70000}
];

console.log("Map (+5000):",
employees.map(e => ({...e, salary:e.salary+5000})));

console.log("Filter (>30000):",
employees.filter(e => e.salary > 30000));

console.log("Find 50000:",
employees.find(e => e.salary === 50000));

console.log("Reduce Total:",
employees.reduce((sum, e) => sum + e.salary, 0));

console.log("Some >60000:",
employees.some(e => e.salary > 60000));

console.log("Every >15000:",
employees.every(e => e.salary > 15000));

// ================= Task 13 - String Methods =================
console.log("---- Task 13 ----");

let company = " Stackly IT ";

console.log(company.toUpperCase());
console.log(company.toLowerCase());
console.log(company.trim());
console.log(company.replace("IT", "Software"));
console.log(company.includes("Stackly"));
console.log(company.split(" "));

// ================= Task 14 - Digital Clock =================
console.log("---- Task 14 ----");

let count = 0;

let clock = setInterval(() => {
    let now = new Date();
    console.log(now.toLocaleTimeString());

    count++;
    if (count === 10) {
        clearInterval(clock);
        console.log("Clock Stopped");
    }
}, 1000);

// ================= Task 15 - Fake Store API =================
console.log("---- Task 15 ----");

fetch("https://fakestoreapi.com/products")
.then(res => res.json())
.then(data => {

    console.log("Titles:");
    data.forEach(p => console.log(p.title));

    console.log("Prices:");
    data.forEach(p => console.log(p.price));

    console.log("Price > 100:");
    console.log(data.filter(p => p.price > 100));

    console.log("Total Products:", data.length);

    let categories = [...new Set(data.map(p => p.category))];
    console.log("Categories:", categories);
});

</script>

</body>
</html>
