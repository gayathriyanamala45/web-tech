<!DOCTYPE html>
<html>
<head>
    <title>Employee Management Tasks</title>
</head>
<body>

<h2>Welcome JavaScript</h2>
<p>Press <b>F12 → Console</b> to see the output.</p>

<script>

// ==========================
// Employee Data
// ==========================
let employees = [
    {
        name: "Gayathri",
        id: 101,
        salary: 50000
    },
    {
        name: "Haritha",
        id: 102,
        salary: 20000
    },
    {
        name: "Priya",
        id: 103,
        salary: 45000
    }
];

// ==========================
// Task 1 - Find Highest Salary
// ==========================
console.log("Task 1");

let highest = employees[0];

for (let emp of employees) {
    if (emp.salary > highest.salary) {
        highest = emp;
    }
}

console.log("Highest Salary :", highest.salary);
console.log("Employee Name :", highest.name);

// ==========================
// Task 2 - Find Employee by ID
// ==========================
console.log("Task 2");

let searchId = 103;
let found = false;

for (let emp of employees) {
    if (emp.id === searchId) {
        console.log("Employee Found");
        console.log("Name :", emp.name);
        console.log("Salary :", emp.salary);
        found = true;
    }
}

if (!found) {
    console.log("Employee Not Found");
}

// ==========================
// Task 3 - Salary with Bonus
// ==========================
console.log("Task 3");

let bonus = 5000;

for (let emp of employees) {
    console.log(emp.name + " : " + (emp.salary + bonus));
}

// ==========================
// Task 4 - Experience Check
// ==========================
console.log("Task 4");

let experienceEmployees = [
    {
        name: "Gayathri",
        experience: 2
    },
    {
        name: "Haritha",
        experience: 7
    },
    {
        name: "Priya",
        experience: 5
    }
];

for (let emp of experienceEmployees) {

    if (emp.experience >= 5) {
        console.log(emp.name + " - Senior Employee");
    } else {
        console.log(emp.name + " - Junior Employee");
    }

}

// ==========================
// Task 5 - Display Employee Names
// ==========================
console.log("Task 5");

for (let emp of employees) {
    console.log(emp.name);
}

// ==========================
// Task 6 - Display Employee IDs
// ==========================
console.log("Task 6");

for (let emp of employees) {
    console.log(emp.id);
}

// ==========================
// Task 7 - Total Salary
// ==========================
console.log("Task 7");

let totalSalary = 0;

for (let emp of employees) {
    totalSalary += emp.salary;
}

console.log("Total Salary :", totalSalary);

// ==========================
// Task 8 - Salary More Than 40000
// ==========================
console.log("Task 8");

for (let emp of employees) {
    if (emp.salary > 40000) {
        console.log(emp.name);
    }
}

// ==========================
// Task 9 - Increase Salary
// ==========================
console.log("Task 9");

for (let emp of employees) {
    console.log(emp.name + " : " + (emp.salary + 5000));
}

// ==========================
// Task 10 - Employee Report
// ==========================
console.log("Task 10");

for (let emp of employees) {

    console.log(`
Employee Name : ${emp.name}
Employee ID   : ${emp.id}
Salary        : ${emp.salary}
`);

}

</script>

</body>
</html>
